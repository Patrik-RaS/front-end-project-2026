<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Page</title>
    
     <!-- linking css for product page   -->
    <link rel="stylesheet" href="css/products.css">
    <link rel="stylesheet" href="css/main.css">
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="headerContent text-main-page">
         <a href="index.html"> 
            <p class="logo"> BaWa Bags & Wallets </p>
        </a> 
    </header>

    <main class="product-page">

        <!-- Image Gallery -->
        <section class="product-gallery">
            <img id="mainImage" src="img/walletBlack1.jpg" alt="Leather wallet">
            <div class="thumbs">
                <img src="img/walletBlack1.1.jpg" onclick="switchImage('walletBlack1.1.jpg')" alt="wallet 1">
                <img src="img/walletBlack1.2.jpg" onclick="switchImage('walletBlack1.2.jpg')" alt="wallet 2">
                <!-- <img src="img/walletBlack1.jpg" onclick="switchImage('walletBlack1.jpg')" alt="wallet 3"> -->
            </div>
        </section>

        <!-- Product Info -->
        <section class="product-info">
            <h2>Full-Grain Leather Wallet</h2>
            <p class="price">€89</p>

            <p class="description">
                A premium full-grain leather wallet with multiple card slots, perfect for everyday carry.
            </p>

            <!-- Options -->
            <div class="options">
                <label for="color">Color</label>
                <select id="color">
                    <option>Black</option>
                    <option>Brown</option>
                    <option>Tan</option>
                </select>

                <label for="size">Size</label>
                <select id="size">
                    <option>Standard</option>
                   <!-- <option>Large</option>   -->
                </select>
            </div>

            <!-- Add to Cart -->
            <button id="addToCartBtn">Add to Cart</button>
            <p id="message"></p>
        </section>

    </main>
    <footer class="text-main-page"> 
         <p>© BaWa Bags & Wallets 2026</p>
    </footer>
    <script src="product.js"></script>
</body>
</html>
