<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecommerce Website / shopping cart</title>
    <script src="js/main.js"defer></script>
    <link rel="stylesheet" href="css/main.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>"
</head>


<body>
    <header>
        <a href="#" class="logo">BaWa Bags & Wallets</a>
        <div id="cart-icon">
            <i class="ri-shopping-bag-fill"></i>
            <span class="cart-item-count"> </span>
        </div>

    </header>

    <div class="cart">
        <h2 class="cart-title">Your Shopping Cart</h2>
        <div class="cart-content">
            <!-- <div class="cart-box">
                <img src="img/bag-2.avif" alt="handmade Black leather bag" class="cart-img">
                <div class="cart-detail">
                    <h2 class="cart-product-title">Black Noir</h2>
                    <span class="cart-price">€200</span>
                    <div class="cart-quantity">
                        <button id="decrement">-</button>
                        <span class="number">1</span>
                        <button id="increment">+</button>

                    </div>
                </div>
                <i class="ri-delete-bin-2-fill cart-remove"></i>
            </div> -->
        </div>
        <div class="total">
            <div class="total-title">Total</div>
            <div class="total-price">€0</div>

        </div>
        <button class="btn-buy">Buy Now</button>
        <i class="ri-close-circle-line" id="cart-close"></i>
    </div>

    <section class="shop">
        <h1 class="section-title">Shop Products</h1>
        <div class="product-content">
            <div class="product-box">
                <div class="img-box">
                    <img src="img/bag-2.avif" alt="handmade Black leather bag"/>
                </div>
                <h2 class="product-title">Black Noir</h2>
                <div class="price-and-cart">
                    <span class="price">€200</span>
                    <i class="ri-shopping-bag-fill add-cart"></i>
                </div>
            </div>
            <div class="product-box">
                <div class="img-box">
                    <img src="img/Bag brown no1.avif" alt="Brown leather bag"/>
                </div>
                <h2 class="product-title">Leo Elegance</h2>
                <div class="price-and-cart">
                    <span class="price">€160</span>
                    <i class="ri-shopping-bag-fill add-cart"></i>
                </div>
            </div>
            <div class="product-box">
                <div class="img-box">
                    <img src="img/bag-1.jpg.avif" alt="Black Elegant leather bag"/>
                </div>
                <h2 class="product-title">Walker</h2>
                <div class="price-and-cart">
                    <span class="price">€140</span>
                    <i class="ri-shopping-bag-fill add-cart"></i>
                </div>
            </div>
            <div class="product-box">
                <div class="img-box">
                    <img src="img/bag black no1.avif" alt="Black leather bag"/>
                </div>
                <h2 class="product-title">Black Celin</h2>
                <div class="price-and-cart">
                    <span class="price">€100</span>
                    <i class="ri-shopping-bag-fill add-cart"></i>
                </div>
            </div>
            <div class="product-box">
                <div class="img-box">
                    <img src="img/bag-2.jpg.avif" alt="Black leather tote bag"/>
                </div>
                <h2 class="product-title">The Skandinavian</h2>
                <div class="price-and-cart">
                    <span class="price">€109</span>
                    <i class="ri-shopping-bag-fill add-cart"></i>
                </div>
            </div>
            <div class="product-box">
                <div class="img-box">
                    <img src="img/bag-3.jpg.avif" alt="Black leather everyday casual bag"/>
                </div>
                <h2 class="product-title">Casual Carrier</h2>
                <div class="price-and-cart">
                    <span class="price">€89</span>
                    <i class="ri-shopping-bag-fill add-cart"></i>
                </div>
            </div>
            <div class="product-box">
                <div class="img-box">
                    <img src="img/bag-5.jpg.avif" alt="Black spacy street bag"/>
                </div>
                <h2 class="product-title">The Night Stalker</h2>
                <div class="price-and-cart">
                    <span class="price">€199</span>
                    <i class="ri-shopping-bag-fill add-cart"></i>
                </div>
            </div>
            <div class="product-box">
                <div class="img-box">
                    <img src="img/bag-6.jpg.avif" alt="Black casual everyday bag"/>
                </div>
                <h2 class="product-title">BaWa Bagpack</h2>
                <div class="price-and-cart">
                    <span class="price">€80</span>
                    <i class="ri-shopping-bag-fill add-cart"></i>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
